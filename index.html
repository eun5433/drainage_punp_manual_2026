<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대용량 배수펌프 매뉴얼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin:0; padding:0; width:100%; height:100%;
  background:#000; overflow:hidden;
}
.swiper { width:100vw; height:100vh; background:#000; }
.swiper-slide {
  display:flex; align-items:center; justify-content:center; background:#000;
}
.swiper-zoom-container { width:100%; height:100%; }
.swiper-zoom-container img {
  max-width:100%; max-height:100%; object-fit:contain;
}
.counter {
  position:fixed; right:12px; bottom:12px; z-index:100;
  padding:6px 12px; border-radius:20px;
  background:rgba(0,0,0,.6); color:#fff; font-size:14px;
}
.pc-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  z-index:100; width:46px; height:70px;
  border:0; border-radius:10px;
  background:rgba(0,0,0,.35); color:white;
  font-size:34px; cursor:pointer;
}
.prev { left:12px; }
.next { right:12px; }

@media (max-width: 768px) {
  .pc-btn { display:none; }
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="01.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="02.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="03.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="04.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="05.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="06.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="07.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="08.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="09.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="10.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="11.png"></div></div>
    <div class="swiper-slide"><div class="swiper-zoom-container"><img src="12.png"></div></div>
  </div>
</div>

<button class="pc-btn prev" onclick="swiper.slidePrev()">‹</button>
<button class="pc-btn next" onclick="swiper.slideNext()">›</button>

<div class="counter"><span id="page">1</span> / 12</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper', {
  direction: 'horizontal',
  slidesPerView: 1,
  speed: 250,
  threshold: 5,
  touchRatio: 1.4,
  longSwipesRatio: 0.15,
  grabCursor: true,
  simulateTouch: true,
  zoom: {
    maxRatio: 3,
    minRatio: 1
  },
  on: {
    slideChange: function () {
      document.getElementById('page').innerText = this.realIndex + 1;
    }
  }
});

// PC 키보드 조작
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') swiper.slideNext();
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') swiper.slidePrev();
  if (e.key === 'Home') swiper.slideTo(0);
  if (e.key === 'End') swiper.slideTo(11);
});

// PC 마우스 휠 조작
let wheelLock = false;
document.addEventListener('wheel', function(e) {
  if (wheelLock) return;

  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    if (e.deltaY > 0) swiper.slideNext();
    else swiper.slidePrev();
  } else {
    if (e.deltaX > 0) swiper.slideNext();
    else swiper.slidePrev();
  }

  wheelLock = true;
  setTimeout(() => wheelLock = false, 450);
}, { passive: true });
</script>

</body>
</html>

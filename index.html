<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대용량 배수펌프 사용매뉴얼</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html,body{
margin:0;
padding:0;
background:#111;
height:100%;
font-family:sans-serif;
}

.title{
position:fixed;
top:0;
left:0;
width:100%;
height:55px;
background:#0b5ed7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
z-index:999;
}

.swiper{
width:100%;
height:100vh;
padding-top:55px;
box-sizing:border-box;
}

.swiper-slide{
display:flex;
justify-content:center;
align-items:center;
background:#111;
}

.swiper-slide img{
width:100%;
height:100%;
object-fit:contain;
}

.swiper-pagination-bullet{
background:white;
opacity:0.7;
}

.swiper-pagination-bullet-active{
background:#0d6efd;
opacity:1;
}

.swiper-button-next,
.swiper-button-prev{
color:white;
}

.counter{
position:fixed;
bottom:15px;
right:15px;
background:rgba(0,0,0,.6);
color:white;
padding:8px 14px;
border-radius:20px;
font-size:16px;
z-index:999;
}
</style>

</head>

<body>

<div class="title">
대용량 배수펌프 사용매뉴얼
</div>

<div class="swiper">
<div class="swiper-wrapper">

<div class="swiper-slide"><img src="01.png"></div>
<div class="swiper-slide"><img src="02.png"></div>
<div class="swiper-slide"><img src="03.png"></div>
<div class="swiper-slide"><img src="04.png"></div>
<div class="swiper-slide"><img src="05.png"></div>
<div class="swiper-slide"><img src="06.png"></div>
<div class="swiper-slide"><img src="07.png"></div>
<div class="swiper-slide"><img src="08.png"></div>
<div class="swiper-slide"><img src="09.png"></div>
<div class="swiper-slide"><img src="10.png"></div>
<div class="swiper-slide"><img src="11.png"></div>
<div class="swiper-slide"><img src="12.png"></div>

</div>

<div class="swiper-button-next"></div>
<div class="swiper-button-prev"></div>
<div class="swiper-pagination"></div>

</div>

<div class="counter">
<span id="page">1</span> / 12
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

const swiper=new Swiper('.swiper',{
loop:false,
navigation:{
nextEl:'.swiper-button-next',
prevEl:'.swiper-button-prev'
},
pagination:{
el:'.swiper-pagination',
clickable:true
},
on:{
slideChange:function(){
document.getElementById("page").innerText=this.realIndex+1;
}
}
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대용량 배수펌프 사용매뉴얼</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.slider {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.slider::-webkit-scrollbar {
  display: none;
}

.slide {
  flex: 0 0 100vw;
  width: 100vw;
  height: 100vh;
  scroll-snap-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

.slide img {
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
}

.counter {
  position: fixed;
  bottom: 12px;
  right: 12px;
  background: rgba(0,0,0,.55);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="slider" id="slider">
  <div class="slide"><img src="01.png"></div>
  <div class="slide"><img src="02.png"></div>
  <div class="slide"><img src="03.png"></div>
  <div class="slide"><img src="04.png"></div>
  <div class="slide"><img src="05.png"></div>
  <div class="slide"><img src="06.png"></div>
  <div class="slide"><img src="07.png"></div>
  <div class="slide"><img src="08.png"></div>
  <div class="slide"><img src="09.png"></div>
  <div class="slide"><img src="10.png"></div>
  <div class="slide"><img src="11.png"></div>
  <div class="slide"><img src="12.png"></div>
</div>

<div class="counter" id="counter">1 / 12</div>

<script>
const slider = document.getElementById('slider');
const counter = document.getElementById('counter');
const total = 12;

slider.addEventListener('scroll', () => {
  const page = Math.round(slider.scrollLeft / window.innerWidth) + 1;
  counter.textContent = page + ' / ' + total;
});
</script>

</body>
</html>
